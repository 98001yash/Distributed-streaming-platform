jwt:
  secret: mysupersecurekeyformysafarsaathijwt1234567890abcdefABCDEF1234567890

server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

      routes:
        - id: auth-service-route
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - JwtAuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 1
                key-resolver: "#{@userKeyResolver}"

        - id: user-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user/**
          filters:
            - JwtAuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"


        - id: content-service-route
          uri: lb://CONTENT-SERVICE
          predicates:
            - Path=/content/**
          filters:
            - JwtAuthenticationFilter

        - id: content-ingestion-service-route
          uri: lb://CONTENT-INGESTION-SERVICE
          predicates:
            - Path=/ingestion/**
          filters:
            - JwtAuthenticationFilter


        - id: streaming-service-route
          uri: lb://STREAMING-SERVICE
          predicates:
            - Path=/streaming/**
          filters:
            - JwtAuthenticationFilter

  data:
    redis:
      host: localhost
      port: 6379

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    prometheus:
      enabled: true

  metrics:
    export:
      prometheus:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"