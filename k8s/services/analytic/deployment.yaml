apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: streaming-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: analytics-service

  template:
    metadata:
      labels:
        app: analytics-service

    spec:
      containers:
        - name: analytics-service
          image: distributed-streaming-platform/analytics-service:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 9095   # change if different

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s

            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092

            - name: REDIS_HOST
              value: redis

            - name: REDIS_PORT
              value: "6379"