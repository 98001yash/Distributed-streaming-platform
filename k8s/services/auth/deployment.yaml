apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: streaming-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth-service
          image: distributed-streaming-platform/auth-service:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 8090

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/streaming_userdb

            - name: SPRING_DATASOURCE_USERNAME
              value: root

            - name: SPRING_DATASOURCE_PASSWORD
              value: yash8252

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka