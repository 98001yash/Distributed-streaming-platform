apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: streaming-platform

data:
  application-docker.yml: |
    server:
      port: 8081

    spring:
      application:
        name: api-gateway

      cloud:
        gateway:
          routes:
            - id: content-service
              uri: lb://CONTENT-SERVICE
              predicates:
                - Path=/content/**

      data:
        redis:
          host: redis
          port: 6379

    eureka:
      client:
        service-url:
          defaultZone: http://discovery-server:8761/eureka