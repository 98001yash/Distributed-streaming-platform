
server.port=8090
spring.application.name=auth-service


spring.datasource.url=jdbc:mysql://mysql:3306/streaming_authdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=mysupersecurekeyformysafarsaathijwt1234567890abcdefABCDEF1234567890
jwt.expiration=3600000

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=auth-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.data.redis.host=redis
spring.data.redis.port=6379
logging.level.org.springframework=INFO
logging.level.com.distributed_streaming_platform=DEBUG


management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=always